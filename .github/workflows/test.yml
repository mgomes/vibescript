name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install ripgrep
        uses: taiki-e/install-action@v2
        with:
          tool: ripgrep

      - name: Install Just
        if: runner.os != 'Windows'
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Run tests (Just)
        if: runner.os != 'Windows'
        run: just test

      - name: Run lint (Just)
        if: runner.os != 'Windows'
        run: just lint

      - name: Check Vibe formatting
        if: runner.os != 'Windows'
        run: go run ./cmd/vibes fmt -check .

      - name: Check zero-arg paren style
        if: runner.os != 'Windows'
        run: ./scripts/check_vibe_zero_arg_parens.sh

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: go test ./...

      - name: Check formatting (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: golangci-lint fmt --diff

      - name: Check Vibe formatting (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: go run ./cmd/vibes fmt -check .

      - name: Check zero-arg paren style (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: ./scripts/check_vibe_zero_arg_parens.sh

      - name: Run golangci-lint (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: golangci-lint run --timeout=10m

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests with coverage
        run: go test -timeout 30m ./... -coverprofile=coverage.out -coverpkg=./... -covermode=atomic

      - name: Enforce coverage gate
        run: ./scripts/check_coverage.sh coverage.out 75.0

      - name: Publish coverage summary
        if: always()
        run: |
          if [[ -f coverage.out ]]; then
            {
              echo "## Test Coverage"
              echo ""
              echo '```text'
              go tool cover -func=coverage.out | tail -n 1
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-profile-${{ github.run_number }}
          path: coverage.out
          if-no-files-found: warn

  race-detector:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run race detector
        run: go test -timeout 30m -race ./...

  goroutine-leak-profile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run goroutine leak profile
        run: GOEXPERIMENT=goroutineleakprofile go test ./internal/runtime

  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Gate examples coverage
        run: go test ./internal/runtime -run 'TestExamples|TestDocsExampleSnippetsCompile'

      - name: Gate Markdown snippet coverage
        run: go test ./internal/tools/analyze -run TestMarkdownVibeSnippetsAreCovered

      - name: Gate known-issues bug bar
        run: ./scripts/check_known_issues.sh

      - name: Gate parser fuzz target
        run: go test ./internal/runtime -run '^$' -fuzz=FuzzCompileScriptDoesNotPanic -fuzztime=10000x

      - name: Gate runtime fuzz target
        run: go test ./internal/runtime -run '^$' -fuzz=FuzzRuntimeEdgeCasesDoNotPanic -fuzztime=10000x
