version: "2"

run:
  timeout: 10m
  concurrency: 4
  modules-download-mode: readonly
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - misspell
    - nolintlint

  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
      exclude-functions:
        - (io.Closer).Close
        - fmt.Fprintln
        - fmt.Fprintf
        - fmt.Fprint

    staticcheck:
      checks:
        - all
        - -ST1005

    misspell:
      locale: US

    nolintlint:
      require-explanation: true
      require-specific: true
      allow-unused: false

  exclusions:
    generated: lax
    paths:
      - benchmarks/baselines
      - testdata
      - examples
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - gofumpt
  settings:
    gofumpt:
      extra-rules: true
      module-path: github.com/mgomes/vibescript

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
