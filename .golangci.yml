version: "2"

run:
  timeout: 10m
  concurrency: 4
  modules-download-mode: readonly
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - errorlint
    - govet
    - staticcheck
    - ineffassign
    - unused
    - misspell
    - revive

  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
      exclude-functions:
        - (io.Closer).Close
        - fmt.Fprintln
        - fmt.Fprintf
        - fmt.Fprint

    errorlint:
      errorf: true
      errorf-multi: true
      asserts: true
      comparison: true

    staticcheck:
      checks:
        - all
        - -ST1005

    misspell:
      locale: US

    revive:
      severity: warning
      rules:
        - name: indent-error-flow
        - name: superfluous-else
        - name: early-return
        - name: error-return
        - name: error-naming
        - name: errorf
        - name: receiver-naming
        - name: var-declaration
        - name: var-naming
        - name: range
        - name: increment-decrement
        - name: dot-imports
        - name: blank-imports
        - name: context-keys-type
        - name: time-naming
        - name: unreachable-code

  exclusions:
    generated: lax
    paths:
      - benchmarks/baselines
      - testdata
      - examples
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - gofumpt
  settings:
    gofumpt:
      extra-rules: true
      module-path: github.com/mgomes/vibescript

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
